name: Deploy to Render PaaS

# Only trigger deployment when code is pushed/merged to the main branch
on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-22.04
    steps:
      - name: Trigger Deploy Hook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "Error: DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -X POST "$DEPLOY_URL"